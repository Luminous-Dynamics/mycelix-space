name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -W clippy::all

      - name: Run tests
        run: cargo test --workspace

  build-wasm:
    name: Build WASM Zomes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Build WASM zomes
        run: |
          # Build only the zomes, not the tools (which have non-WASM dependencies)
          cargo build --release --target wasm32-unknown-unknown \
            -p orbital_objects_integrity -p orbital_objects_coordinator \
            -p observations_integrity -p observations_coordinator \
            -p conjunctions_integrity -p conjunctions_coordinator \
            -p debris_bounties_integrity -p debris_bounties_coordinator \
            -p traffic_control_integrity -p traffic_control_coordinator

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-zomes
          path: target/wasm32-unknown-unknown/release/*.wasm

  # Note: hApp packaging requires Holochain CLI which isn't in nixpkgs
  # Build locally with: ./scripts/build-happ.sh
  # Or use the Holochain dev environment: https://developer.holochain.org/
