name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  build-wasm:
    name: Build WASM Zomes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Build WASM zomes
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-zomes
          path: target/wasm32-unknown-unknown/release/*.wasm

  build-happ:
    name: Build hApp
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install Holochain
        run: |
          nix profile install nixpkgs#holochain

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-zomes
          path: target/wasm32-unknown-unknown/release/

      - name: Package DNA
        run: |
          mkdir -p workdir/dna workdir/happ
          hc dna pack dna -o workdir/dna/mycelix_space.dna

      - name: Package hApp
        run: |
          hc app pack dna -o workdir/happ/mycelix_space.happ

      - name: Upload hApp
        uses: actions/upload-artifact@v4
        with:
          name: mycelix-space-happ
          path: workdir/happ/mycelix_space.happ
